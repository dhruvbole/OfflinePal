name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download MobileBERT model
        run: |
          mkdir -p app/src/main/assets/model
          curl -L -o app/src/main/assets/model/mobilebert.tflite https://storage.googleapis.com/download.tensorflow.org/models/tflite/bert_qa/mobilebert_qa_squad.tflite

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: OfflinePal-debug
          path: app/build/outputs/apk/debug/app-debug.apk
