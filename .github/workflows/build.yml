name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'

      - name: Show repo structure (debug)
        run: find . -maxdepth 4 -name "settings.gradle" -o -name "build.gradle" | sort

      - name: Download MobileBERT model
        run: |
          mkdir -p app/src/main/assets/model
          curl -L -o app/src/main/assets/model/mobilebert.tflite https://storage.googleapis.com/download.tensorflow.org/models/tflite/bert_qa/mobilebert_qa_squad.tflite

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflinePal-debug
          path: app/build/outputs/apk/debug/app-debug.apk
