          cat > app/src/main/java/com/offlinepal/notes/NoteEditorActivity.kt << 'ENDOFFILE'
          package com.offlinepal.notes
          import android.os.Bundle; import android.view.Menu; import android.view.MenuItem; import android.widget.Toast
          import androidx.activity.viewModels; import androidx.appcompat.app.AppCompatActivity; import androidx.lifecycle.lifecycleScope
          import com.offlinepal.R; import com.offlinepal.databinding.ActivityNoteEditorBinding
          import kotlinx.coroutines.launch
          class NoteEditorActivity : AppCompatActivity() {
              private lateinit var b: ActivityNoteEditorBinding; private val vm: NoteViewModel by viewModels()
              private var noteId = -1L; private var currentNote: Note? = null; private var color = 0; private var pinned = false
              companion object { const val EXTRA_NOTE_ID = "extra_note_id" }
              override fun onCreate(s: Bundle?) {
                  super.onCreate(s); b = ActivityNoteEditorBinding.inflate(layoutInflater); setContentView(b.root)
                  setSupportActionBar(b.toolbarEditor); supportActionBar?.setDisplayHomeAsUpEnabled(true); supportActionBar?.title = ""
                  noteId = intent.getLongExtra(EXTRA_NOTE_ID, -1L)
                  if (noteId != -1L) lifecycleScope.launch { vm.getNoteById(noteId)?.let { n -> currentNote = n; b.editNoteTitle.setText(n.title); b.editNoteContent.setText(n.content); color = n.color; pinned = n.isPinned } }
                  listOf(b.colorDefault to 0, b.colorYellow to 1, b.colorGreen to 2, b.colorBlue to 3, b.colorPink to 4).forEach { (v, c) -> v.setOnClickListener { color = c } }
              }
              override fun onCreateOptionsMenu(m: Menu): Boolean { menuInflater.inflate(R.menu.menu_note_editor, m); return true }
              override fun onOptionsItemSelected(item: MenuItem) = when (item.itemId) { android.R.id.home -> { saveAndExit(); true }; R.id.action_pin -> { pinned = !pinned; true }; R.id.action_delete -> { currentNote?.let { vm.delete(it) }; finish(); true }; else -> super.onOptionsItemSelected(item) }
              @Deprecated("Deprecated") override fun onBackPressed() { saveAndExit() }
              private fun saveAndExit() {
                  val t = b.editNoteTitle.text.toString().trim(); val c = b.editNoteContent.text.toString().trim()
                  if (t.isBlank() && c.isBlank()) { finish(); return }
                  if (noteId == -1L) vm.insert(Note(title = t.ifBlank { "Untitled" }, content = c, color = color, isPinned = pinned))
                  else currentNote?.let { vm.update(it.copy(title = t.ifBlank { "Untitled" }, content = c, color = color, isPinned = pinned)) }
                  Toast.makeText(this, "Saved", Toast.LENGTH_SHORT).show(); finish()
              }
          }
          ENDOFFILE

