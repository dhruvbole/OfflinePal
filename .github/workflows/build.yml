          package com.offlinepal.todo
          import androidx.room.*; import kotlinx.coroutines.flow.Flow
          @Entity(tableName = "todo_items")
          data class TodoItem(@PrimaryKey(autoGenerate = true) val id: Long = 0, val title: String, val isCompleted: Boolean = false, val priority: Int = 1, val createdAt: Long = System.currentTimeMillis())
          @Dao
          interface TodoDao {
              @Query("SELECT * FROM todo_items ORDER BY isCompleted ASC, priority DESC, createdAt DESC") fun getAllTodos(): Flow<List<TodoItem>>
              @Query("SELECT * FROM todo_items WHERE isCompleted = 0 ORDER BY priority DESC") fun getActiveTodos(): Flow<List<TodoItem>>
              @Query("SELECT * FROM todo_items WHERE isCompleted = 1 ORDER BY createdAt DESC") fun getCompletedTodos(): Flow<List<TodoItem>>
              @Insert(onConflict = OnConflictStrategy.REPLACE) suspend fun insert(item: TodoItem): Long
              @Update suspend fun update(item: TodoItem)
              @Delete suspend fun delete(item: TodoItem)
              @Query("DELETE FROM todo_items WHERE isCompleted = 1") suspend fun deleteAllCompleted()
              @Query("SELECT COUNT(*) FROM todo_items WHERE isCompleted = 0") fun getActiveCount(): Flow<Int>
          }
