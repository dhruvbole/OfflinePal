          package com.offlinepal.timer
          import android.app.*; import android.content.*; import android.os.*; import androidx.core.app.NotificationCompat
          import com.offlinepal.R; import com.offlinepal.ui.MainActivity
          class TimerService : Service() {
              companion object { const val CHANNEL_ID = "timer_channel"; const val NOTIF_ID = 1001; const val ACTION_START = "ACTION_START"; const val ACTION_PAUSE = "ACTION_PAUSE"; const val ACTION_STOP = "ACTION_STOP"; const val EXTRA_DURATION_MS = "extra_duration_ms"; const val BROADCAST_TICK = "com.offlinepal.TIMER_TICK"; const val BROADCAST_FINISH = "com.offlinepal.TIMER_FINISH"; const val EXTRA_REMAINING_MS = "extra_remaining_ms"; const val EXTRA_IS_RUNNING = "extra_is_running" }
              private val binder = TimerBinder(); private var timer: CountDownTimer? = null; private var remaining = 0L; private var running = false; private var isStopwatch = false; private var swMs = 0L; private val handler = Handler(Looper.getMainLooper()); private var swRunnable: Runnable? = null
              inner class TimerBinder : Binder() { fun getService() = this@TimerService }
              override fun onBind(i: Intent?) = binder
              override fun onCreate() { super.onCreate(); if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) getSystemService(NotificationManager::class.java).createNotificationChannel(NotificationChannel(CHANNEL_ID, "Timer", NotificationManager.IMPORTANCE_LOW)) }
              override fun onStartCommand(intent: Intent?, f: Int, id: Int): Int { when(intent?.action) { ACTION_START -> { val d = intent.getLongExtra(EXTRA_DURATION_MS, 0L); if (d > 0) startCountdown(d) else startStopwatch() }; ACTION_PAUSE -> pause(); ACTION_STOP -> stop() }; return START_NOT_STICKY }
              fun startCountdown(ms: Long) { isStopwatch = false; remaining = ms; running = true; timer?.cancel(); timer = object : CountDownTimer(ms, 100) { override fun onTick(left: Long) { remaining = left; broadcast(left, true) }; override fun onFinish() { running = false; remaining = 0; sendBroadcast(Intent(BROADCAST_FINISH)); vibrate(); stopForeground(STOP_FOREGROUND_REMOVE) } }.start(); startForeground(NOTIF_ID, notif("Countdown")) }
              fun startStopwatch() { isStopwatch = true; running = true; swMs = 0L; swRunnable = object : Runnable { override fun run() { swMs += 100; broadcast(swMs, true); if (running) handler.postDelayed(this, 100) } }; handler.post(swRunnable!!); startForeground(NOTIF_ID, notif("Stopwatch")) }
              fun pause() { running = false; timer?.cancel(); swRunnable?.let { handler.removeCallbacks(it) }; broadcast(if (isStopwatch) swMs else remaining, false) }
              fun stop() { running = false; timer?.cancel(); swRunnable?.let { handler.removeCallbacks(it) }; remaining = 0; swMs = 0; stopForeground(STOP_FOREGROUND_REMOVE); stopSelf() }
              fun resumeTimer() { if (isStopwatch) { running = true; handler.post(swRunnable!!) } else if (remaining > 0) startCountdown(remaining) }
              private fun broadcast(ms: Long, run: Boolean) = sendBroadcast(Intent(BROADCAST_TICK).putExtra(EXTRA_REMAINING_MS, ms).putExtra(EXTRA_IS_RUNNING, run))
              private fun notif(sub: String) = NotificationCompat.Builder(this, CHANNEL_ID).setContentTitle("OfflinePal Timer").setContentText(sub).setSmallIcon(R.drawable.ic_timer).setOngoing(true).setContentIntent(PendingIntent.getActivity(this, 0, Intent(this, MainActivity::class.java), PendingIntent.FLAG_IMMUTABLE)).build()
              private fun vibrate() { val v = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) (getSystemService(VIBRATOR_MANAGER_SERVICE) as VibratorManager).defaultVibrator else @Suppress("DEPRECATION") getSystemService(VIBRATOR_SERVICE) as Vibrator; if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) v.vibrate(VibrationEffect.createWaveform(longArrayOf(0,500,200,500), -1)) else @Suppress("DEPRECATION") v.vibrate(longArrayOf(0,500,200,500), -1) }
              override fun onDestroy() { timer?.cancel(); swRunnable?.let { handler.removeCallbacks(it) }; super.onDestroy() }
          }
