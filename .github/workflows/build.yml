          cat > app/src/main/java/com/offlinepal/todo/TodoViewModel.kt << 'ENDOFFILE'
          package com.offlinepal.todo
          import android.app.Application; import androidx.lifecycle.*; import com.offlinepal.AppDatabase
          import kotlinx.coroutines.flow.MutableStateFlow; import kotlinx.coroutines.flow.flatMapLatest; import kotlinx.coroutines.launch
          class TodoViewModel(app: Application) : AndroidViewModel(app) {
              private val dao = AppDatabase.getDatabase(app).todoDao()
              private val filter = MutableStateFlow(0)
              val todos: LiveData<List<TodoItem>> = filter.flatMapLatest { when(it) { 1 -> dao.getActiveTodos(); 2 -> dao.getCompletedTodos(); else -> dao.getAllTodos() } }.asLiveData()
