          package com.offlinepal.notes
          import android.view.LayoutInflater; import android.view.ViewGroup
          import androidx.recyclerview.widget.DiffUtil; import androidx.recyclerview.widget.ListAdapter; import androidx.recyclerview.widget.RecyclerView
          import com.offlinepal.R; import com.offlinepal.databinding.ItemNoteBinding
          import java.text.SimpleDateFormat; import java.util.*
          class NoteAdapter(private val onNoteClick: (Note) -> Unit, private val onNoteLongClick: (Note) -> Unit) : ListAdapter<Note, NoteAdapter.NoteViewHolder>(DIFF) {
              private val df = SimpleDateFormat("MMM d", Locale.getDefault())
              private val colors = intArrayOf(R.color.note_default, R.color.note_yellow, R.color.note_green, R.color.note_blue, R.color.note_pink)
              override fun onCreateViewHolder(p: ViewGroup, v: Int) = NoteViewHolder(ItemNoteBinding.inflate(LayoutInflater.from(p.context), p, false))
              override fun onBindViewHolder(h: NoteViewHolder, pos: Int) = h.bind(getItem(pos))
              inner class NoteViewHolder(private val b: ItemNoteBinding) : RecyclerView.ViewHolder(b.root) {
                  fun bind(n: Note) {
                      b.textNoteTitle.text = n.title.ifBlank { "Untitled" }
                      b.textNoteContent.text = n.content
                      b.textNoteDate.text = df.format(Date(n.updatedAt))
                      b.cardNote.setCardBackgroundColor(b.root.context.getColor(colors.getOrElse(n.color) { colors[0] }))
                      b.iconPin.visibility = if (n.isPinned) android.view.View.VISIBLE else android.view.View.GONE
                      b.root.setOnClickListener { onNoteClick(n) }
                      b.root.setOnLongClickListener { onNoteLongClick(n); true }
                  }
              }
              companion object { val DIFF = object : DiffUtil.ItemCallback<Note>() { override fun areItemsTheSame(o: Note, n: Note) = o.id == n.id; override fun areContentsTheSame(o: Note, n: Note) = o == n } }
          }
          ENDOFFILE

