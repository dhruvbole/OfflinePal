          package com.offlinepal.notes
          import androidx.room.*
          import kotlinx.coroutines.flow.Flow
          @Entity(tableName = "notes")
          data class Note(@PrimaryKey(autoGenerate = true) val id: Long = 0, val title: String, val content: String, val createdAt: Long = System.currentTimeMillis(), val updatedAt: Long = System.currentTimeMillis(), val isPinned: Boolean = false, val color: Int = 0)
          @Dao
          interface NoteDao {
              @Query("SELECT * FROM notes ORDER BY isPinned DESC, updatedAt DESC") fun getAllNotes(): Flow<List<Note>>
              @Query("SELECT * FROM notes WHERE id = :id") suspend fun getNoteById(id: Long): Note?
              @Query("SELECT * FROM notes WHERE title LIKE :query OR content LIKE :query ORDER BY updatedAt DESC") fun searchNotes(query: String): Flow<List<Note>>
              @Insert(onConflict = OnConflictStrategy.REPLACE) suspend fun insertNote(note: Note): Long
              @Update suspend fun updateNote(note: Note)
              @Delete suspend fun deleteNote(note: Note)
              @Query("DELETE FROM notes WHERE id = :id") suspend fun deleteNoteById(id: Long)
          }
          ENDOFFILE

          cat > app/src/main/java/com/offlinepal/notes/NoteRepository.kt << 'ENDOFFILE'
          package com.offlinepal.notes
          import kotlinx.coroutines.flow.Flow
          class NoteRepository(private val noteDao: NoteDao) {
              val allNotes: Flow<List<Note>> = noteDao.getAllNotes()
              fun searchNotes(query: String): Flow<List<Note>> = noteDao.searchNotes("%$query%")
              suspend fun getNoteById(id: Long): Note? = noteDao.getNoteById(id)
              suspend fun insert(note: Note): Long = noteDao.insertNote(note)
              suspend fun update(note: Note) = noteDao.updateNote(note.copy(updatedAt = System.currentTimeMillis()))
              suspend fun delete(note: Note) = noteDao.deleteNote(note)
          }
          ENDOFFILE

          cat > app/src/main/java/com/offlinepal/notes/NoteViewModel.kt << 'ENDOFFILE'
          package com.offlinepal.notes
          import android.app.Application
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.LiveData
          import androidx.lifecycle.asLiveData
          import androidx.lifecycle.viewModelScope
          import com.offlinepal.AppDatabase
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.flatMapLatest
          import kotlinx.coroutines.launch
          class NoteViewModel(application: Application) : AndroidViewModel(application) {
              private val repository = NoteRepository(AppDatabase.getDatabase(application).noteDao())
              private val searchQuery = MutableStateFlow("")
              val notes: LiveData<List<Note>> = searchQuery.flatMapLatest { q -> if (q.isBlank()) repository.allNotes else repository.searchNotes(q) }.asLiveData()
              fun setSearchQuery(query: String) { searchQuery.value = query }
              fun insert(note: Note) = viewModelScope.launch { repository.insert(note) }
              fun update(note: Note) = viewModelScope.launch { repository.update(note) }
              fun delete(note: Note) = viewModelScope.launch { repository.delete(note) }
              suspend fun getNoteById(id: Long): Note? = repository.getNoteById(id)
          }
          ENDOFFILE

