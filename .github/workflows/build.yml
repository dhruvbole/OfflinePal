          package com.offlinepal.ai
          import android.content.Context; import android.util.Log
          class LocalAiEngine(private val context: Context) {
              data class AiResponse(val text: String)
              fun process(input: String): AiResponse {
                  val trimmed = input.trim(); if (trimmed.isBlank()) return AiResponse("Please type something.")
                  val lower = trimmed.lowercase()
                  if (lower == "help") return AiResponse("I can help with:\n• General knowledge questions\n• Math: 'calculate 15% of 200'\n• Unit conversion: '10 km to miles'\n• Text: 'summarize: [text]'\n• Word count: 'count words [text]'")
                  if (lower.startsWith("calculate ") || lower.startsWith("compute ")) { val expr = lower.replace("calculate","").replace("compute","").trim(); val r = tryMath(expr); if (r != null) return AiResponse("Result: $r") }
                  val conv = tryConvert(lower); if (conv != null) return AiResponse(conv)
                  if (lower.startsWith("summarize:") || lower.startsWith("summarize ")) { val text = trimmed.substringAfter(":").trim().ifBlank { trimmed.removePrefix("summarize").trim() }; return AiResponse(summarize(text)) }
                  if (lower.startsWith("count words ")) { val words = trimmed.removePrefix("count words").trim().split("\\s+".toRegex()).filter { it.isNotBlank() }.size; return AiResponse("Word count: $words") }
                  if (lower.matches(Regex("(hi|hello|hey|howdy).*"))) return AiResponse("Hello! How can I help you today? Type 'help' to see what I can do.")
                  if (lower.contains("thank")) return AiResponse("You're welcome!")
                  val kb = KnowledgeBase.findAnswer(trimmed); if (kb != null) return AiResponse(kb)
                  return if (trimmed.split("\\s+".toRegex()).size > 15) AiResponse(summarize(trimmed)) else AiResponse("I'm not sure about that. Try asking a general knowledge question, or type 'help' to see all my features.")
              }
              private fun summarize(text: String): String {
                  if (text.length < 80) return "Text is already short: \"$text\""
                  val sentences = text.split(Regex("[.!?]+")).map { it.trim() }.filter { it.length > 10 }
                  if (sentences.isEmpty()) return "Could not summarize."
                  val summary = sentences.take(3).joinToString(". ") + "."
                  val pct = ((1 - summary.length.toFloat() / text.length) * 100).toInt().coerceAtLeast(0)
                  return "Summary ($pct% shorter):\n\n$summary"
              }
              private fun tryMath(expr: String): String? = try { val clean = expr.replace(" ","").replace("%","/100.0*"); val r = eval(clean); if (r == r.toLong().toDouble()) r.toLong().toString() else "%.4f".format(r).trimEnd('0').trimEnd('.') } catch(e: Exception) { null }
              private fun eval(e: String): Double { var p = 0; fun num(): Double { val s = p; if (p < e.length && (e[p]=='-'||e[p]=='+')) p++; while(p < e.length && (e[p].isDigit()||e[p]=='.')) p++; return e.substring(s,p).toDouble() }; fun factor(): Double = if(p < e.length && e[p]=='(') { p++; val r = expr2(); if(p < e.length && e[p]==')') p++; r } else num(); fun term(): Double { var r = factor(); while(p < e.length && (e[p]=='*'||e[p]=='/')) { val op=e[p++]; val right=factor(); r = if(op=='*') r*right else r/right }; return r }; fun expr2(): Double { var r = term(); while(p < e.length && (e[p]=='+'||e[p]=='-')) { val op=e[p++]; r = if(op=='+') r+term() else r-term() }; return r }; return expr2() }
              private fun tryConvert(s: String): String? { val patterns = listOf(Regex("(\\d+\\.?\\d*)\\s*km\\s*to\\s*miles?") to { v: Double -> "${String.format("%.2f",v*0.621371)} miles" }, Regex("(\\d+\\.?\\d*)\\s*miles?\\s*to\\s*km") to { v: Double -> "${String.format("%.2f",v*1.60934)} km" }, Regex("(\\d+\\.?\\d*)\\s*kg\\s*to\\s*(lbs?|pounds?)") to { v: Double -> "${String.format("%.2f",v*2.20462)} lbs" }, Regex("(\\d+\\.?\\d*)\\s*(lbs?|pounds?)\\s*to\\s*kg") to { v: Double -> "${String.format("%.2f",v*0.453592)} kg" }, Regex("(\\d+\\.?\\d*)\\s*celsius\\s*to\\s*fahrenheit") to { v: Double -> "${String.format("%.1f",v*9/5+32)}°F" }, Regex("(\\d+\\.?\\d*)\\s*fahrenheit\\s*to\\s*celsius") to { v: Double -> "${String.format("%.1f",(v-32)*5/9)}°C" }, Regex("(\\d+\\.?\\d*)\\s*m\\s*to\\s*(ft|feet)") to { v: Double -> "${String.format("%.2f",v*3.28084)} feet" }, Regex("(\\d+\\.?\\d*)\\s*(ft|feet)\\s*to\\s*m") to { v: Double -> "${String.format("%.2f",v*0.3048)} m" }); for ((rx, fn) in patterns) { val m = rx.find(s); if (m != null) { val v = m.groupValues[1].toDoubleOrNull() ?: continue; return "${m.value} = ${fn(v)}" } }; return null }
              fun close() {}
          }
          ENDOFFILE

          cat > app/src/main/java/com/offlinepal/ai/ChatMessage.kt << 'ENDOFFILE'
          package com.offlinepal.ai
          data class ChatMessage(val text: String, val isUser: Boolean, val isTyping: Boolean = false, val timestamp: Long = System.currentTimeMillis())
          ENDOFFILE

          cat > app/src/main/java/com/offlinepal/ai/ChatAdapter.kt << 'ENDOFFILE'
          package com.offlinepal.ai
          import android.view.LayoutInflater; import android.view.View; import android.view.ViewGroup
          import androidx.recyclerview.widget.RecyclerView
          import com.offlinepal.databinding.ItemChatUserBinding; import com.offlinepal.databinding.ItemChatAssistantBinding
          import java.text.SimpleDateFormat; import java.util.*
          class ChatAdapter(private val messages: List<ChatMessage>) : RecyclerView.Adapter<RecyclerView.ViewHolder>() {
              private val tf = SimpleDateFormat("HH:mm", Locale.getDefault())
              override fun getItemViewType(p: Int) = if (messages[p].isUser) 0 else 1
              override fun onCreateViewHolder(p: ViewGroup, t: Int) = if (t == 0) UserVH(ItemChatUserBinding.inflate(LayoutInflater.from(p.context), p, false)) else AiVH(ItemChatAssistantBinding.inflate(LayoutInflater.from(p.context), p, false))
              override fun onBindViewHolder(h: RecyclerView.ViewHolder, pos: Int) { val m = messages[pos]; if (h is UserVH) h.bind(m) else if (h is AiVH) h.bind(m) }
              override fun getItemCount() = messages.size
              inner class UserVH(private val b: ItemChatUserBinding) : RecyclerView.ViewHolder(b.root) { fun bind(m: ChatMessage) { b.textUserMessage.text = m.text; b.textUserTime.text = tf.format(Date(m.timestamp)) } }
              inner class AiVH(private val b: ItemChatAssistantBinding) : RecyclerView.ViewHolder(b.root) { fun bind(m: ChatMessage) { b.textAssistantMessage.text = m.text; b.progressTyping.visibility = if (m.isTyping) View.VISIBLE else View.GONE; b.textAssistantTime.text = tf.format(Date(m.timestamp)) } }
          }
          ENDOFFILE

          cat > app/src/main/java/com/offlinepal/ai/AiFragment.kt << 'ENDOFFILE'
          package com.offlinepal.ai
          import android.os.Bundle; import android.view.*; import android.view.inputmethod.EditorInfo
          import androidx.fragment.app.Fragment; import androidx.lifecycle.lifecycleScope
          import androidx.recyclerview.widget.LinearLayoutManager
          import com.offlinepal.databinding.FragmentAiBinding
          import kotlinx.coroutines.Dispatchers; import kotlinx.coroutines.launch; import kotlinx.coroutines.withContext
          class AiFragment : Fragment() {
              private var _b: FragmentAiBinding? = null; private val b get() = _b!!
              private lateinit var adapter: ChatAdapter; private lateinit var engine: LocalAiEngine
              private val msgs = mutableListOf<ChatMessage>()
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?) = FragmentAiBinding.inflate(i, c, false).also { _b = it }.root
              override fun onViewCreated(v: View, s: Bundle?) {
                  super.onViewCreated(v, s); engine = LocalAiEngine(requireContext())
                  adapter = ChatAdapter(msgs); b.recyclerChat.layoutManager = LinearLayoutManager(requireContext()).apply { stackFromEnd = true }; b.recyclerChat.adapter = adapter
                  addAiMsg("Hi! I'm your offline AI assistant. Ask me anything, or type 'help' to see what I can do!")
                  b.btnSend.setOnClickListener { send() }
                  b.editInput.setOnEditorActionListener { _, a, _ -> if (a == EditorInfo.IME_ACTION_SEND) { send(); true } else false }
                  b.chipHelp.setOnClickListener { send("help") }; b.chipCalculate.setOnClickListener { send("calculate 15% of 250") }; b.chipConvert.setOnClickListener { send("10 km to miles") }; b.chipSummarize.setOnClickListener { b.editInput.setText("summarize: "); b.editInput.requestFocus() }
              }
              private fun send(text: String = b.editInput.text.toString().trim()) { if (text.isBlank()) return; b.editInput.setText(""); addUserMsg(text); val typing = ChatMessage("Thinking...", false, true); msgs.add(typing); adapter.notifyItemInserted(msgs.size-1); scroll(); lifecycleScope.launch(Dispatchers.IO) { val r = engine.process(text); withContext(Dispatchers.Main) { val idx = msgs.indexOf(typing); if (idx >= 0) { msgs.removeAt(idx); adapter.notifyItemRemoved(idx) }; addAiMsg(r.text) } } }
              private fun addUserMsg(t: String) { msgs.add(ChatMessage(t, true)); adapter.notifyItemInserted(msgs.size-1); scroll() }
              private fun addAiMsg(t: String) { msgs.add(ChatMessage(t, false)); adapter.notifyItemInserted(msgs.size-1); scroll() }
              private fun scroll() { b.recyclerChat.post { if (msgs.isNotEmpty()) b.recyclerChat.smoothScrollToPosition(msgs.size-1) } }
              override fun onDestroyView() { super.onDestroyView(); engine.close(); _b = null }
          }
          ENDOFFILE

      - name: Download Gradle wrapper and build
        run: |
          # Write the gradlew shell script
          cat > gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          APP_HOME=`dirname "$0"`
          APP_HOME=`cd "$APP_HOME" && pwd`
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -Xmx512m -Xms64m -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW_EOF

          chmod +x gradlew

          # Download gradle wrapper jar
          echo "Downloading Gradle wrapper jar..."
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true

          # If jar is empty or missing, install Gradle directly and use it
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Wrapper jar unavailable, installing Gradle 8.1.1 directly..."
            wget -q "https://services.gradle.org/distributions/gradle-8.1.1-bin.zip" -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            export PATH="/tmp/gradle-dist/gradle-8.1.1/bin:$PATH"
            gradle wrapper --gradle-version 8.1.1
            chmod +x gradlew
          fi

          echo "=== Verifying project files ==="
          ls -la
          ls -la app/src/main/java/com/offlinepal/
          echo "=== Building APK ==="
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflinePal-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
