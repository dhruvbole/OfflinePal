          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent">
              <ViewFlipper android:id="@+id/view_flipper" android:layout_width="match_parent" android:layout_height="match_parent">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:padding="24dp" android:gravity="center">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="🧠" android:textSize="72sp"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Flashcard Quiz" android:textSize="28sp" android:textStyle="bold" android:layout_marginTop="16dp"/>
                      <TextView android:id="@+id/text_card_count" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Loading cards..." android:textSize="14sp" android:alpha="0.6" android:layout_marginTop="8dp" android:layout_marginBottom="32dp"/>
                      <com.google.android.material.button.MaterialButton android:id="@+id/btn_start_session" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Start Quiz" android:paddingStart="32dp" android:paddingEnd="32dp" android:layout_marginBottom="16dp"/>
                      <com.google.android.material.button.MaterialButton android:id="@+id/btn_add_card" style="@style/Widget.Material3.Button.OutlinedButton" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Add Card" android:paddingStart="32dp" android:paddingEnd="32dp" android:layout_marginBottom="16dp"/>
                      <com.google.android.material.button.MaterialButton android:id="@+id/btn_manage_cards" style="@style/Widget.Material3.Button.TextButton" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Manage cards"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:padding="16dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center_vertical" android:layout_marginBottom="8dp">
                          <TextView android:id="@+id/text_category" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textSize="13sp" android:alpha="0.6"/>
                          <TextView android:id="@+id/text_progress" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textSize="13sp" android:alpha="0.6"/>
                      </LinearLayout>
                      <ProgressBar android:id="@+id/progress_quiz" style="?android:attr/progressBarStyleHorizontal" android:layout_width="match_parent" android:layout_height="6dp" android:max="100" android:progress="0" android:layout_marginBottom="16dp"/>
                      <FrameLayout android:id="@+id/card_flashcard" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:layout_marginBottom="16dp">
                          <androidx.cardview.widget.CardView android:id="@+id/card_front" android:layout_width="match_parent" android:layout_height="match_parent" app:cardCornerRadius="16dp" app:cardElevation="4dp" app:cardBackgroundColor="@color/card_front">
                              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center" android:padding="24dp">
                                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="QUESTION" android:textSize="11sp" android:alpha="0.5" android:layout_marginBottom="16dp"/>
                                  <TextView android:id="@+id/text_question" android:layout_width="match_parent" android:layout_height="wrap_content" android:gravity="center" android:textSize="22sp" android:textStyle="bold"/>
                                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Tap to reveal answer" android:textSize="12sp" android:alpha="0.4" android:layout_marginTop="24dp"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>
                          <androidx.cardview.widget.CardView android:id="@+id/card_back" android:layout_width="match_parent" android:layout_height="match_parent" app:cardCornerRadius="16dp" app:cardElevation="4dp" app:cardBackgroundColor="@color/card_back" android:visibility="gone">
                              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center" android:padding="24dp">
                                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="ANSWER" android:textSize="11sp" android:alpha="0.5" android:layout_marginBottom="16dp"/>
                                  <TextView android:id="@+id/text_answer" android:layout_width="match_parent" android:layout_height="wrap_content" android:gravity="center" android:textSize="22sp" android:textStyle="bold"/>
                              </LinearLayout>
                          </androidx.cardview.widget.CardView>
