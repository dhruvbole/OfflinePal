name: Build OfflinePal APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create all directories
        run: |
          mkdir -p app/src/main/java/com/offlinepal/ui
          mkdir -p app/src/main/java/com/offlinepal/notes
          mkdir -p app/src/main/java/com/offlinepal/todo
          mkdir -p app/src/main/java/com/offlinepal/timer
          mkdir -p app/src/main/java/com/offlinepal/quiz
          mkdir -p app/src/main/java/com/offlinepal/ai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/navigation
          mkdir -p app/src/main/res/animator
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets/model
          mkdir -p gradle/wrapper

      - name: Write Gradle build files
        run: |
          cat > settings.gradle << 'ENDOFFILE'
          rootProject.name = "OfflinePal"
          include ':app'
          ENDOFFILE

          cat > build.gradle << 'ENDOFFILE'
          buildscript {
              ext.kotlin_version = "1.9.10"
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.1.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          ENDOFFILE

          cat > gradle.properties << 'ENDOFFILE'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          ENDOFFILE

          cat > gradle/wrapper/gradle-wrapper.properties << 'ENDOFFILE'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          ENDOFFILE

          cat > app/build.gradle << 'ENDOFFILE'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
              id 'kotlin-kapt'
          }
          android {
              namespace 'com.offlinepal'
              compileSdk 34
              defaultConfig {
                  applicationId "com.offlinepal"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
              buildFeatures { viewBinding true }
              aaptOptions { noCompress "tflite" }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.fragment:fragment-ktx:1.6.2'
              implementation 'androidx.navigation:navigation-fragment-ktx:2.7.5'
              implementation 'androidx.navigation:navigation-ui-ktx:2.7.5'
              implementation 'androidx.room:room-runtime:2.6.0'
              implementation 'androidx.room:room-ktx:2.6.0'
              kapt 'androidx.room:room-compiler:2.6.0'
              implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2'
              implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.6.2'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'org.tensorflow:tensorflow-lite:2.13.0'
              implementation 'org.tensorflow:tensorflow-lite-support:0.4.4'
              implementation 'org.tensorflow:tensorflow-lite-task-text:0.4.4'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
          }
          ENDOFFILE

          cat > app/proguard-rules.pro << 'ENDOFFILE'
          -keep class org.tensorflow.** { *; }
          -keep class com.google.flatbuffers.** { *; }
          ENDOFFILE

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.OfflinePal"
                  android:dataExtractionRules="@xml/data_extraction_rules"
                  android:fullBackupContent="@xml/backup_rules"
                  tools:targetApi="31">
                  <activity android:name=".ui.MainActivity" android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".notes.NoteEditorActivity" android:exported="false"
                      android:windowSoftInputMode="adjustResize"/>
                  <service android:name=".timer.TimerService" android:exported="false"
                      android:foregroundServiceType="specialUse"/>
              </application>
          </manifest>
          ENDOFFILE

      - name: Write resource values
        run: |
          cat > app/src/main/res/values/strings.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">OfflinePal</string>
              <string name="action_delete">Delete</string>
              <string name="action_pin">Pin</string>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/colors.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary">#1976D2</color>
              <color name="primary_dark">#1565C0</color>
              <color name="on_primary">#FFFFFF</color>
              <color name="secondary">#26A69A</color>
              <color name="on_secondary">#FFFFFF</color>
              <color name="surface">#FFFFFF</color>
              <color name="on_surface">#212121</color>
              <color name="background">#FAFAFA</color>
              <color name="note_default">#FFFFFF</color>
              <color name="note_yellow">#FFF9C4</color>
              <color name="note_green">#DCEDC8</color>
              <color name="note_blue">#BBDEFB</color>
              <color name="note_pink">#F8BBD9</color>
              <color name="priority_low">#4CAF50</color>
              <color name="priority_medium">#FFC107</color>
              <color name="priority_high">#F44336</color>
              <color name="chat_user_bubble">#1976D2</color>
              <color name="chat_user_text">#FFFFFF</color>
              <color name="chat_ai_bubble">#F0F4F8</color>
              <color name="chat_ai_text">#212121</color>
              <color name="card_front">#E8F5E9</color>
              <color name="card_back">#E3F2FD</color>
              <color name="timer_accent">#FF6F00</color>
              <color name="splash_bg">#1565C0</color>
              <color name="splash_text">#FFFFFF</color>
              <color name="splash_text_sub">#B3E5FC</color>
              <color name="status_bar">#1565C0</color>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/themes.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.OfflinePal" parent="Theme.Material3.Light.NoActionBar">
                  <item name="colorPrimary">@color/primary</item>
                  <item name="colorPrimaryVariant">@color/primary_dark</item>
                  <item name="colorOnPrimary">@color/on_primary</item>
                  <item name="colorSecondary">@color/secondary</item>
                  <item name="colorOnSecondary">@color/on_secondary</item>
                  <item name="android:colorBackground">@color/background</item>
                  <item name="colorSurface">@color/surface</item>
                  <item name="colorOnSurface">@color/on_surface</item>
                  <item name="android:statusBarColor">@color/status_bar</item>
              </style>
          </resources>
          ENDOFFILE

          cat > app/src/main/res/values/dimens.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="card_corner_radius">12dp</dimen>
              <dimen name="fab_margin">16dp</dimen>
              <dimen name="screen_padding">16dp</dimen>
          </resources>
          ENDOFFILE

      - name: Write XML config files
        run: |
          cat > app/src/main/res/xml/backup_rules.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="database" path="offlinepal_database"/>
              <exclude domain="cache" path="."/>
          </full-backup-content>
          ENDOFFILE

          cat > app/src/main/res/xml/data_extraction_rules.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="database" path="offlinepal_database"/>
                  <exclude domain="cache" path="."/>
              </cloud-backup>
          </data-extraction-rules>
          ENDOFFILE

      - name: Write navigation graph
        run: |
          cat > app/src/main/res/navigation/nav_graph.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <navigation xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/nav_graph"
              app:startDestination="@id/notesFragment">
              <fragment android:id="@+id/notesFragment" android:name="com.offlinepal.notes.NotesFragment" android:label="Notes"/>
              <fragment android:id="@+id/todoFragment" android:name="com.offlinepal.todo.TodoFragment" android:label="Tasks"/>
              <fragment android:id="@+id/timerFragment" android:name="com.offlinepal.timer.TimerFragment" android:label="Timer"/>
              <fragment android:id="@+id/quizFragment" android:name="com.offlinepal.quiz.QuizFragment" android:label="Quiz"/>
              <fragment android:id="@+id/aiFragment" android:name="com.offlinepal.ai.AiFragment" android:label="AI"/>
          </navigation>
          ENDOFFILE

      - name: Write menu files
        run: |
          cat > app/src/main/res/menu/bottom_nav_menu.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@+id/notesFragment" android:icon="@drawable/ic_note" android:title="Notes"/>
              <item android:id="@+id/todoFragment" android:icon="@drawable/ic_checklist" android:title="Tasks"/>
              <item android:id="@+id/timerFragment" android:icon="@drawable/ic_timer" android:title="Timer"/>
              <item android:id="@+id/quizFragment" android:icon="@drawable/ic_quiz" android:title="Quiz"/>
              <item android:id="@+id/aiFragment" android:icon="@drawable/ic_ai" android:title="AI"/>
          </menu>
          ENDOFFILE

          cat > app/src/main/res/menu/menu_note_editor.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto">
              <item android:id="@+id/action_pin" android:title="Pin" android:icon="@drawable/ic_pin_outline" app:showAsAction="ifRoom"/>
              <item android:id="@+id/action_delete" android:title="Delete" android:icon="@drawable/ic_delete" app:showAsAction="ifRoom"/>
          </menu>
          ENDOFFILE

      - name: Write drawables
        run: |
          cat > app/src/main/res/drawable/ic_add.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_note.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M16,11H8V13H16V11M16,15H8V17H16V15M11,7H8V9H11V7Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_checklist.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M9,5H7A2,2 0 0,0 5,7V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V7A2,2 0 0,0 17,5H15V3H9V5M9,7H15V5H17V19H7V7H9M7,13H10V11H7V13M7,17H10V15H7V17M13,13H17V11H13V13M13,17H17V15H13V17Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_timer.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M15,1H9V3H15V1M11,14H13V8H11V14M19.03,7.39L20.45,5.97C20,5.46 19.55,5 19.04,4.56L17.62,6C16.07,4.74 14.12,4 12,4A9,9 0 0,0 3,13A9,9 0 0,0 12,22C17,22 21,17.97 21,13C21,10.88 20.26,8.93 19.03,7.39M12,20A7,7 0 0,1 5,13A7,7 0 0,1 12,6A7,7 0 0,1 19,13A7,7 0 0,1 12,20Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_quiz.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M11,18H13V16H11V18M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,6A4,4 0 0,0 8,10H10A2,2 0 0,1 12,8A2,2 0 0,1 14,10C14,12 11,11.75 11,15H13C13,12.75 16,12.5 16,10A4,4 0 0,0 12,6Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_ai.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M7,2V13H10V22L17,11H13L17,2Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_send.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/white" android:pathData="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_delete.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_pin_outline.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12M8.8,14L10,12.8V4H14V12.8L15.2,14H8.8Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_pin_filled.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="@android:color/black" android:pathData="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#1976D2"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'ENDOFFILE'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#FFFFFF" android:pathData="M62,28L38,58H52L46,80L70,50H56Z"/></vector>
          ENDOFFILE
          cat > app/src/main/res/drawable/color_circle_default.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#E0E0E0"/><stroke android:width="2dp" android:color="#9E9E9E"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/color_circle_yellow.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#FFF9C4"/><stroke android:width="2dp" android:color="#F9A825"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/color_circle_green.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#DCEDC8"/><stroke android:width="2dp" android:color="#558B2F"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/color_circle_blue.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#BBDEFB"/><stroke android:width="2dp" android:color="#1565C0"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/color_circle_pink.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#F8BBD9"/><stroke android:width="2dp" android:color="#AD1457"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/bg_tab_bar.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#F0F4F8"/><corners android:radius="24dp"/></shape>
          ENDOFFILE
          cat > app/src/main/res/drawable/bg_priority_low.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#4CAF50"/><corners android:radius="2dp"/></shape>
          ENDOFFILE

      - name: Write launcher icons
        run: |
          ICON='<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>'
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            echo "$ICON" > app/src/main/res/$d/ic_launcher.xml
            echo "$ICON" > app/src/main/res/$d/ic_launcher_round.xml
          done

      - name: Write flip animators
        run: |
          cat > app/src/main/res/animator/card_flip_left_out.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><set xmlns:android="http://schemas.android.com/apk/res/android"><objectAnimator android:valueFrom="0" android:valueTo="-180" android:propertyName="rotationY" android:duration="400"/></set>
          ENDOFFILE
          cat > app/src/main/res/animator/card_flip_right_in.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><set xmlns:android="http://schemas.android.com/apk/res/android"><objectAnimator android:valueFrom="180" android:valueTo="0" android:propertyName="rotationY" android:duration="400"/></set>
          ENDOFFILE
          cat > app/src/main/res/animator/card_flip_right_out.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><set xmlns:android="http://schemas.android.com/apk/res/android"><objectAnimator android:valueFrom="0" android:valueTo="180" android:propertyName="rotationY" android:duration="400"/></set>
          ENDOFFILE
          cat > app/src/main/res/animator/card_flip_left_in.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?><set xmlns:android="http://schemas.android.com/apk/res/android"><objectAnimator android:valueFrom="-180" android:valueTo="0" android:propertyName="rotationY" android:duration="400"/></set>
          ENDOFFILE

      - name: Write layout files
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent">
              <androidx.fragment.app.FragmentContainerView android:id="@+id/nav_host_fragment" android:name="androidx.navigation.fragment.NavHostFragment" android:layout_width="0dp" android:layout_height="0dp" app:defaultNavHost="true" app:navGraph="@navigation/nav_graph" app:layout_constraintTop_toTopOf="parent" app:layout_constraintBottom_toTopOf="@id/bottom_navigation" app:layout_constraintStart_toStartOf="parent" app:layout_constraintEnd_toEndOf="parent"/>
              <com.google.android.material.bottomnavigation.BottomNavigationView android:id="@+id/bottom_navigation" android:layout_width="0dp" android:layout_height="wrap_content" android:background="?attr/colorSurface" app:menu="@menu/bottom_nav_menu" app:layout_constraintBottom_toBottomOf="parent" app:layout_constraintStart_toStartOf="parent" app:layout_constraintEnd_toEndOf="parent" app:labelVisibilityMode="labeled"/>
          </androidx.constraintlayout.widget.ConstraintLayout>
          ENDOFFILE

          cat > app/src/main/res/layout/activity_splash.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:background="@color/splash_bg">
